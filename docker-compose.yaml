version: '3.8'
services:
  airflow:
    image: apache/airflow:2.10.0-python3.12
    container_name: airflow_wealth_tech
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./invest_analytics:/opt/airflow/invest_analytics
      - ./credentials:/opt/airflow/credentials
      - ./requirements.txt:/opt/airflow/requirements.txt
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - GOOGLE_APPLICATION_CREDENTIALS=/opt/airflow/credentials/gcp_key.json
      - _AIRFLOW_DB_UPGRADE=True
      - _PIP_ADDITIONAL_DEPENDENCIES=yfinance pandas-gbq db-dtypes dbt-bigquery
    command: >
      bash -c "pip install --upgrade pip && 
               pip install -r /opt/airflow/requirements.txt && 
               airflow db init && 
               (airflow users create --username admin --firstname admin --lastname admin --role Admin --email admin@admin.com --password admin || true) &&
               airflow webserver & airflow scheduler"
    ports:
      - "8080:8080"