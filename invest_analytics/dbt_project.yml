name: 'invest_analytics'
version: '1.0.0'
config-version: 2

profile: 'invest_analytics'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# Configuração de Modelos e Camadas
models:
  invest_analytics:
    +persist_docs:
      relation: true
      columns: true
    
    # Camada Silver: Dados limpos e padronizados
    staging:
      +materialized: view
    
    # Camada Gold: Indicadores de Performance e Agregados
    marts:
      +materialized: table
      +schema: gold
      +cluster_by: ["data_pregao", "ticker"]
      +partition_by:
        field: data_pregao
        data_type: date
        granularity: day

# Configuração de Seeds (Arquivos CSV como tabelas)
seeds:
  invest_analytics:
    +schema: gold
    +persist_docs:
      relation: true
      columns: true
    +column_types:
      ticker: string
      nome_empresa: string
      setor: string
